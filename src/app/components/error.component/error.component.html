<!-- not-found.html -->
<div class="not-found-container">
  <canvas #starsCanvas class="stars-canvas"></canvas>
  <div class="glow-blob"></div>

  <div class="card">
    <div class="orbit"><div class="orbit-dot"></div></div>

    <span class="error-badge">Error</span>
    <div class="error-code">404</div>
    <h1>Page Not Found</h1>
    <p class="desc">
      The page you're looking for doesn't exist or has drifted into the void.
      Let's get you back on track.
    </p>

    <div class="chat-bubble">
      <span>💬</span>
      <span>This chat room is empty...</span>
      <span class="bubble-dot"></span>
      <span class="bubble-dot"></span>
      <span class="bubble-dot"></span>
    </div>

    <div class="buttons">
      <a routerLink="/" class="btn btn-primary">Go back Home</a>
      <a routerLink="/register" class="btn btn-secondary">Start for Free</a>
    </div>
  </div>
</div>
